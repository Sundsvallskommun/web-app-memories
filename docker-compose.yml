version: '3'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT-3001}:3000"
    container_name: ${COMPOSE_PROJECT_NAME}-backend-${NODE_ENV}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    network_mode: bridge
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT-3000}:3000"
    container_name: ${COMPOSE_PROJECT_NAME}-frontend-${NODE_ENV}
    depends_on:
      backend:
        condition: service_healthy
    network_mode: bridge
    restart: unless-stopped
